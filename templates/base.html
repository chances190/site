<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ config.description }}">
    <title>{% if page %}{{ page.title }}{% else %}{{ section.title }}{% endif %} | {{ config.title }}</title>
    <link rel="icon" type="image/svg+xml" href="{{ get_url(path='/assets/favicon.ico') }}">
    <!-- <link rel="stylesheet" href="{{ get_url(path='/assets/reset.css') }}"> -->
    <link rel="stylesheet" href="{{ get_url(path='/assets/style.css') }}">
</head>

<body>
    <main>
        <header>
            <h1>Sanches</h1>
            <nav>
                {% for item in config.extra.nav %}
                <a href="{{ get_url(path=item.path) | safe }}">{{ item.label }}</a>
                {% endfor %}
                <a rel="external" href="https://c.xkcd.com/random/comic/">random xkcd</a>
            </nav>
        </header>
        <article>
            {% if page %}
            {{ page.content | safe }}
            {% elif section %}
            {% block content %}{% endblock %}
            {% endif %}
        </article>
        <hr>
        <footer>
            <p><em id="quote"></em></p>
            <script>
                fetch('/assets/quotes.json')
                    .then(r => r.json())
                    .then(quotes => {
                        const q = quotes[Math.floor(Math.random() * quotes.length)];
                        document.getElementById('quote').textContent = `"${q.quote}" — ${q.author}`;
                    })
                    .catch(e => console.log('Failed to load quotes:', e));
            </script>
        </footer>
    </main>
</body>

</html>
