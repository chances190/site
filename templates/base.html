<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page %}{{ page.title }}{% else %}{{ section.title }}{% endif %} | {{ config.title }}</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.ico">
    <!-- <link rel="stylesheet" href="/assets/reset.css"> -->
    <link rel="stylesheet" href="/assets/style.css">
</head>

<body>
    <main>
        <header>
            <h1>Sanches</h1>
            <nav>
                {% for item in config.extra.nav %}
                <a href="{{ item.url | safe }}">{{ item.label }}</a>
                {% endfor %}
            </nav>
        </header>
        <article>
            {% if page %}
            {{ page.content | safe }}
            {% elif section %}
            {% block content %}{% endblock %}
            {% endif %}
        </article>
        <hr>
        <footer>
            <p><small></small></p>
            <p><a href="https://c.xkcd.com/random/comic/"></a><em id="quote"></em></a></p>
            <script>
                fetch('/assets/quotes.json')
                    .then(r => r.json())
                    .then(quotes => {
                        const q = quotes[Math.floor(Math.random() * quotes.length)];
                        document.getElementById('quote').textContent = `"${q.quote}" — ${q.author}`;
                    })
                    .catch(e => console.log('Failed to load quotes:', e));
            </script>
        </footer>
    </main>
</body>

</html>
