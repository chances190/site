name: Build & Deploy
name: Deploy Zola

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shalzz/zola-deploy-action@v0.17.2
        env:
          PAGES_BRANCH: gh-pages
          BUILD_DIR: ssg-test/zola
          TOKEN: ${{ secrets.GITHUB_TOKEN }}